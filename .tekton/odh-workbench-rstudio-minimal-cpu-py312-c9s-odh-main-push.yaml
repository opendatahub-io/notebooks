apiVersion: tekton.dev/v1
kind: PipelineRun
#test1
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/opendatahub-io/notebooks?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: 'false'
    pipelinesascode.tekton.dev/max-keep-runs: '3'
    build.appstudio.openshift.io/build-nudge-files: manifests/base/params-latest.env
    pipelinesascode.tekton.dev/on-cel-expression: event == "push" && target_branch == "main" && !("manifests/base/params-latest.env".pathChanged()) && ( ".tekton/odh-workbench-rstudio-minimal-cpu-py312-c9s-odh-main-push.yaml".pathChanged() || "rstudio/c9s-python-3.12/**".pathChanged() || "rstudio/c9s-python-3.12/build-args/cpu.conf".pathChanged() )
  creationTimestamp:
  labels:
    appstudio.openshift.io/application: opendatahub-release
    appstudio.openshift.io/component: odh-workbench-rstudio-minimal-cpu-py312-c9s
    pipelines.appstudio.openshift.io/type: build
  name: odh-workbench-rstudio-minimal-cpu-py312-c9s-odh-main-push
  namespace: open-data-hub-tenant
spec:
  timeouts:
    pipeline: 8h
  params:
  - name: event-type
    value: '{{event_type}}'
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/opendatahub/odh-workbench-rstudio-minimal-cpu-py312-c9s:{{revision}}
  - name: dockerfile
    value: rstudio/c9s-python-3.12/Dockerfile.cpu
  - name: build-args-file
    value: rstudio/c9s-python-3.12/build-args/cpu.conf
  - name: path-context
    value: .
  - name: additional-tags
    value:
    - '{{target_branch}}-{{revision}}'
    - 3.4-v1.43
  pipelineRef:
    name: multiarch-odh-main-combined-pipeline
  taskRunTemplate:
    serviceAccountName: build-pipeline-odh-workbench-rstudio-minimal-cpu-py312-c9s
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
  taskRunSpecs:
  - pipelineTaskName: build-images
    stepSpecs:
    - name: prepare-sboms
      computeResources:
        requests:
          cpu: '8'
          memory: 32Gi
        limits:
          cpu: '8'
          memory: 32Gi
    - name: sbom-syft-generate
      computeResources:
        requests:
          cpu: '8'
          memory: 32Gi
        limits:
          cpu: '8'
          memory: 32Gi
status: {}
