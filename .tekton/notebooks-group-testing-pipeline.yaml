---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: notebooks-e2e-test
spec:
  description: |
    An integration test which provisions an ephemeral Hypershift cluster, deploys opendatahub-operator
    from a Konflux snapshot and runs the e2e tests against it.
  params:
    - description: Git repository URL of the PR that triggered this test
      name: repo-url
      type: string
    - description: Git commit SHA of the PR head
      name: revision
      type: string
    - description: List of components in the group
      name: group-components
      type: string
  tasks:
    - name: generate-snapshot
      description: Placeholder task that prints the Snapshot and outputs standard TEST_OUTPUT
      params:
        - name: COMPONENTS
          value: $(params.group-components)
      workspaces:
      - name: basic-auth
        workspace: git-auth
      - name: shared-data
        workspace: shared-data
      taskRef:
        resolver: git
        params:
        - name: url
          value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
        - name: revision
          value: main
        - name: pathInRepo
          value: konflux-tekton-tasks/generate-snapshot-for-group-testing/0.1/generate-snapshot-for-group-testing.yaml
    - name: audit-snapshot
      runAfter:
        - generate-snapshot
      workspaces:
        - name: shared-data
          workspace: shared-data
      params:
        - name: COMPONENTS
          value: $(params.group-components)
      taskSpec:
        workspaces:
          - name: shared-data
            optional: true
        params:
          - name: COMPONENTS
            description: List of components in the group
        steps:
          - name: audit-snapshot
            image: quay.io/konflux-ci/konflux-test:stable
            workingDir: /workspace
            env:
              - name: SNAPSHOT
                value: $(tasks.generate-snapshot.results.SNAPSHOT)
              - name: COMPONENTS
                value: $(params.COMPONENTS)
            script: |
              #!/bin/bash
              set -euo pipefail
              echo "SNAPSHOT=${SNAPSHOT}"
              if [[ -f "${SNAPSHOT}" ]]; then
                  echo "SNAPSHOT is a file path, reading contents"
                  SNAPSHOT=$(cat "${SNAPSHOT}")
              fi

              # Parse JSON and iterate through each component
              while IFS= read -r row; do
                  COMPONENT_NAME=$(echo "$row" | base64 -d | jq -r '.key')
                  IMAGE=$(jq -r --arg component_name "${COMPONENT_NAME}" '.[$component_name].image' <<< "${SNAPSHOT}")
                  GIT_COMMIT=$(jq -r --arg component_name "${COMPONENT_NAME}" '.[$component_name]."git.commit"' <<< "${SNAPSHOT}")
                  GIT_URL=$(jq -r --arg component_name "${COMPONENT_NAME}" '.[$component_name]."git.url"' <<< "${SNAPSHOT}")
                  echo "${COMPONENT_NAME} IMAGE: ${IMAGE}"
                  echo "GIT_COMMIT=${GIT_COMMIT}"
                  echo "GIT_URL=${GIT_URL}"
              done < <(echo "$COMPONENTS" | jq -r 'to_entries[] | @base64')
    - name: provision-eaas-space
      runAfter:
        - audit-snapshot
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
      params:
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)
    - name: provision-cluster
      runAfter:
        - provision-eaas-space
      taskSpec:
        results:
          - name: clusterName
            value: "$(steps.create-cluster.results.clusterName)"
        steps:
          - name: get-supported-versions
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-supported-ephemeral-cluster-versions/0.1/eaas-get-supported-ephemeral-cluster-versions.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
          - name: pick-version
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-latest-openshift-version-by-prefix/0.1/eaas-get-latest-openshift-version-by-prefix.yaml
            params:
              - name: prefix
                value: "$(steps.get-supported-versions.results.versions[0])."
          - name: create-cluster
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
              - name: version
                value: "$(steps.pick-version.results.version)"
              - name: instanceType
                value: m5.2xlarge

    # When generate-snapshot resolves a component that wasn't rebuilt for this PR
    # (no odh-pr-<N> tag on Quay), git.url and git.commit are empty in the snapshot.
    # The deploy-and-test script needs a repo to clone for Makefile/test harness,
    # so we pass the PR's own repo URL and commit as fallback.
    - name: deploy-and-test
      runAfter:
        - provision-cluster
      workspaces:
        - name: shared-data
          workspace: shared-data
      params:
        - name: FALLBACK_REPO_URL
          value: $(params.repo-url)
        - name: FALLBACK_REVISION
          value: $(params.revision)
      taskSpec:
        params:
          - name: FALLBACK_REPO_URL
            type: string
          - name: FALLBACK_REVISION
            type: string
        volumes:
          - name: credentials
            emptyDir: {}
        steps:
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
              - name: clusterName
                value: "$(tasks.provision-cluster.results.clusterName)"
              - name: credentials
                value: credentials
          - name: e2e-jupyter-minimal-ubi9-python-3-12
            image: quay.io/rhoai/rhoai-task-toolset:notebooks
            env:
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
              - name: SNAPSHOT
                value: $(tasks.generate-snapshot.results.SNAPSHOT)
              - name: FALLBACK_REPO_URL
                value: $(params.FALLBACK_REPO_URL)
              - name: FALLBACK_REVISION
                value: $(params.FALLBACK_REVISION)
            workingDir: /workspace/source
            volumeMounts:
              - name: credentials
                mountPath: /credentials
            script: |
              #!/bin/bash
              oc get pods
              oc whoami

              if [[ -f "${SNAPSHOT}" ]]; then
                  echo "SNAPSHOT is a file path, reading contents"
                  SNAPSHOT=$(cat "${SNAPSHOT}")
              fi

              # Clone once using the PR's repo and commit
              REPO_URL=${FALLBACK_REPO_URL}
              REVISION=${FALLBACK_REVISION}
              echo "Cloning test harness from REPO_URL=${REPO_URL} REVISION=${REVISION}"
              git clone "${REPO_URL}" src_code
              cd src_code
              git checkout ${REVISION}

              FAILURES=0
              RESULTS=()

              # Helper: extract image for a component and run deploy/test/undeploy
              run_workbench_test() {
                  local component_name=$1
                  local project_name=$2
                  local deploy_target=$3
                  local test_target=$4
                  local undeploy_target=$5

                  echo ""
                  echo "=========================================="
                  echo "Testing: ${component_name}"
                  echo "=========================================="

                  local IMAGE
                  IMAGE=$(jq -r --arg c "${component_name}" '.[$c].image' <<< "${SNAPSHOT}")
                  echo "  IMAGE: ${IMAGE}"

                  oc new-project "${project_name}" || oc project "${project_name}"
                  IFS=':' read -r -a NOTEBOOK_IMAGE <<< "${IMAGE}"

                  local deploy_rc=0 test_rc=0 undeploy_rc=0
                  make "${deploy_target}" \
                      -e IMAGE_REGISTRY="${NOTEBOOK_IMAGE[0]}" -e NOTEBOOK_TAG="${NOTEBOOK_IMAGE[1]}" || deploy_rc=$?
                  if [[ ${deploy_rc} -eq 0 ]]; then
                      make "${test_target}" || test_rc=$?
                  else
                      test_rc=1
                  fi
                  # always undeploy to prevent resource leaks
                  make "${undeploy_target}" || undeploy_rc=$?

                  if [[ ${deploy_rc} -ne 0 || ${test_rc} -ne 0 || ${undeploy_rc} -ne 0 ]]; then
                      RESULTS+=("FAIL: ${component_name} (deploy=${deploy_rc} test=${test_rc} undeploy=${undeploy_rc})")
                      return 1
                  fi
                  RESULTS+=("PASS: ${component_name}")
              }

              run_workbench_test \
                  odh-workbench-jupyter-datascience-cpu-py312-ubi9-ci \
                  jupyter-datascience-ubi9-python-3-12 \
                  deploy9-jupyter-datascience-ubi9-python-3.12 \
                  test-jupyter-datascience-ubi9-python-3.12 \
                  undeploy9-jupyter-datascience-ubi9-python-3.12 \
                  || ((FAILURES++))

              run_workbench_test \
                  odh-workbench-jupyter-pytorch-cuda-py312-ubi9-ci \
                  jupyter-pytorch-ubi9-python-3-12 \
                  deploy9-jupyter-pytorch-ubi9-python-3.12 \
                  test-jupyter-pytorch-ubi9-python-3.12 \
                  undeploy9-jupyter-pytorch-ubi9-python-3.12 \
                  || ((FAILURES++))

              run_workbench_test \
                  odh-workbench-jupyter-minimal-cuda-py312-ubi9-ci \
                  cuda-jupyter-minimal-ubi9-python-3-12 \
                  deploy9-cuda-jupyter-minimal-ubi9-python-3.12 \
                  test-cuda-jupyter-minimal-ubi9-python-3.12 \
                  undeploy9-cuda-jupyter-minimal-ubi9-python-3.12 \
                  || ((FAILURES++))

              run_workbench_test \
                  odh-workbench-jupyter-tensorflow-cuda-py312-ubi9-ci \
                  cuda-jupyter-tensorflow-ubi9-python-3-12 \
                  deploy9-cuda-jupyter-tensorflow-ubi9-python-3.12 \
                  test-cuda-jupyter-tensorflow-ubi9-python-3.12 \
                  undeploy9-cuda-jupyter-tensorflow-ubi9-python-3.12 \
                  || ((FAILURES++))

              run_workbench_test \
                  odh-workbench-jupyter-trustyai-cpu-py312-ubi9-ci \
                  jupyter-trustyai-ubi9-python-3-12 \
                  deploy9-jupyter-trustyai-ubi9-python-3.12 \
                  test-jupyter-trustyai-ubi9-python-3.12 \
                  undeploy9-jupyter-trustyai-ubi9-python-3.12 \
                  || ((FAILURES++))

              echo ""
              echo "=========================================="
              echo "Results: ${FAILURES} failure(s) out of ${#RESULTS[@]} workbenches"
              echo "=========================================="
              for r in "${RESULTS[@]}"; do
                  echo "  ${r}"
              done
              echo "=========================================="
              exit ${FAILURES}
  workspaces:
  - name: git-auth
    optional: true
  - name: shared-data
    optional: true
