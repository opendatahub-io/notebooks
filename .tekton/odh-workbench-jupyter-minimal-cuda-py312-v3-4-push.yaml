apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/red-hat-data-services/notebooks?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    build.appstudio.openshift.io/build-nudge-files: "build/operator-nudging.yaml, images/universal/training/th06-cuda130-torch210-py312/Dockerfile.konflux.cuda"
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "push"
      && target_branch == "rhoai-3.4"
      && !("manifests/base/params-latest.env".pathChanged())
      && ( ".tekton/odh-workbench-jupyter-minimal-cuda-py312-v3-4-push.yaml".pathChanged() || "jupyter/utils/**".pathChanged() || "jupyter/minimal/ubi9-python-3.12/**".pathChanged() || "cuda/**".pathChanged() )
  labels:
    appstudio.openshift.io/application: rhoai-v3-4
    appstudio.openshift.io/component: odh-workbench-jupyter-minimal-cuda-py312-v3-4
    pipelines.appstudio.openshift.io/type: build
  name: odh-workbench-jupyter-minimal-cuda-py312-v3-4-on-push
  namespace: rhoai-tenant
spec:
  timeouts:
    pipeline: 8h
    tasks: 4h
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: additional-tags
    value:
    - '{{target_branch}}-{{revision}}'
  - name: output-image
    value: quay.io/rhoai/odh-workbench-jupyter-minimal-cuda-py312-rhel9:{{target_branch}}
  - name: rhoai-version
    value: "3.4.1"
  - name: dockerfile
    value: jupyter/minimal/ubi9-python-3.12/Dockerfile.konflux.cuda
  - name: build-args-file
    value: jupyter/minimal/ubi9-python-3.12/build-args/konflux.cuda.conf
  - name: path-context
    value: .
  - name: enable-cache-proxy
    value: true
  # Hermetic: RPMs from prefetch-input/rhds; pip from requirements.cuda.txt (see opendatahub-io/notebooks/.tekton minimal CUDA PR pipeline)
  - name: hermetic
    value: false
  - name: build-source-image
    value: true
  - name: build-image-index
    value: true
  - name: build-platforms
    value:
    - linux-d160-m8xlarge/amd64
    - linux-d160-m8xlarge/arm64
  - name: disable-slack-notifications
    value: "true"
  - name: rhel-subscription-activation-key
    value: rhel-subscription-activation-key-rhoai-devops-for-notebooks-rhel9-6
  - name: prefetch-input
    value:
    - path: prefetch-input/rhds
      type: rpm
    - path: jupyter/minimal/ubi9-python-3.12
      type: pip
      binary:
        arch: "x86_64,aarch64"
      requirements_files: [requirements.cuda.txt]
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/red-hat-data-services/konflux-central.git
    - name: revision
      value: '{{ target_branch }}'
    - name: pathInRepo
      value: pipelines/multi-arch-container-build.yaml
  taskRunSpecs:
  - pipelineTaskName: prefetch-dependencies
    computeResources:
      requests:
        cpu: '3'
        memory: 8Gi
      limits:
        cpu: '3'
        memory: 8Gi
  - pipelineTaskName: build-images
    stepSpecs:
    - name: prepare-sboms
      computeResources:
        requests:
          cpu: '3'
          memory: 8Gi
        limits:
          cpu: '3'
          memory: 8Gi
    - name: sbom-syft-generate
      computeResources:
        requests:
          cpu: '3'
          memory: 8Gi
        limits:
          cpu: '3'
          memory: 8Gi
    - name: build
      computeResources:
        requests:
          cpu: '3'
          memory: 8Gi
        limits:
          cpu: '3'
          memory: 8Gi
  - pipelineTaskName: clair-scan
    computeResources:
      requests:
        cpu: '3'
        memory: 8Gi
      limits:
        cpu: '3'
        memory: 8Gi
  - pipelineTaskName: ecosystem-cert-preflight-checks
    computeResources:
      requests:
        cpu: '3'
        memory: 8Gi
      limits:
        cpu: '3'
        memory: 8Gi
  taskRunTemplate:
    serviceAccountName: build-pipeline-odh-workbench-jupyter-minimal-cuda-py312-v3-4
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
