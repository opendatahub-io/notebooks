apiVersion: tekton.dev/v1
kind: PipelineRun
# retrigger Konflux builds to fix https://issues.redhat.com/browse/RHOAIENG-31914
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/red-hat-data-services/notebooks?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-comment: "^/(build-konflux|build-codeserver)"
    pipelinesascode.tekton.dev/on-label: "[kfbuild-all, kfbuild-workbench, kfbuild-cpu, kfbuild-datascience, kfbuild-codeserver, kfbuild-workbench-codeserver-datascience-cpu]"
    pipelinesascode.tekton.dev/on-target-branch: "[{{target_branch}}]"
    pipelinesascode.tekton.dev/on-event: "[pull_request]"
  labels:
    appstudio.openshift.io/application: automation
    appstudio.openshift.io/component: pull-request-pipelines-notebooks
    pipelines.appstudio.openshift.io/type: build
  name: odh-workbench-codeserver-datascience-cpu-py312-on-pull-request-75964
  namespace: rhoai-tenant
spec:
  timeouts:
    pipeline: 8h0m0s
    tasks: "4h0m0s"
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/rhoai/pull-request-pipelines:notebooks-{{revision}}
  - name: additional-tags
    value:
    - '{{target_branch}}-{{revision}}'
  - name: additional-labels
    value:
    - version=on-pr-{{revision}}
    - io.openshift.tags=odh-workbench-codeserver-datascience-cpu-py312
  - name: dockerfile
    value: codeserver/ubi9-python-3.12/Dockerfile.konflux.cpu
  - name: build-args-file
    value: codeserver/ubi9-python-3.12/build-args/konflux.cpu.conf
  - name: rhoai-version
    value: "2.25.3"
  - name: path-context
    value: .
  - name: enable-cache-proxy
    value: true
  # rhoai-2.25: hermetic waiver (hermetic_task.hermetic until 2027-05-03). Keep npm
  # prefetch for the large VS Code tree; install pip / X.org / oc at build time so
  # Hermeto does not emit Conforma-failing binary-wheel / generic / openshift-clients SBOM attrs.
  - name: hermetic
    value: false
  - name: build-image-index
    value: true
  - name: build-platforms
    value:
    - linux-d160-m8xlarge/amd64
    - linux-d160-m8xlarge/arm64
    - linux/ppc64le
    - linux/s390x
  - name: image-expires-after
    value: 5d
  - name: enable-slack-failure-notification
    value: "false"
  - name: fips-check-blocking
    value: "false"
  - name: rhel-subscription-activation-key
    value: "rhel-subscription-activation-key-rhoai-devops-for-notebooks-rhel9-6"
  - name: prefetch-input
    value:
    - path: codeserver/ubi9-python-3.12/prefetch-input/code-server/lib/vscode/.vscode/extensions/vscode-selfhost-import-aid
      type: npm
    - path: codeserver/ubi9-python-3.12/prefetch-input/code-server/lib/vscode/.vscode/extensions/vscode-selfhost-test-provider
      type: npm
    - path: codeserver/ubi9-python-3.12/prefetch-input/code-server/lib/vscode/build
      type: npm
