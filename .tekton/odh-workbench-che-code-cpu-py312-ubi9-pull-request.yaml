# yamllint disable-file
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/opendatahub-io/notebooks?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: 'true'
    pipelinesascode.tekton.dev/max-keep-runs: '3'
    pipelinesascode.tekton.dev/on-comment: ^/kfbuild\s+(all|odh\-workbench\-che\-code\-cpu\-py312\-ubi9|codeserver/che\-code\-ubi9\-python\-3\.12)
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "pull_request" && target_branch == "main" &&
      !("manifests/base/params-latest.env".pathChanged()) &&
      (
        ".tekton/odh-workbench-che-code-cpu-py312-ubi9-pull-request.yaml".pathChanged() ||
        "codeserver/che-code-ubi9-python-3.12/**".pathChanged()
      ) && body.repository.full_name == "opendatahub-io/notebooks"
  labels:
    appstudio.openshift.io/application: opendatahub-release
    appstudio.openshift.io/component: odh-workbench-che-code-cpu-py312-ubi9
    pipelines.appstudio.openshift.io/type: build
  name: odh-workbench-che-code-cpu-py312-ubi9-on-pull-request
  namespace: open-data-hub-tenant
spec:
  timeouts:
    pipeline: 6h
  params:
  - name: event-type
    value: '{{event_type}}'
  - name: enable-cache-proxy
    value: 'true'
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/open-data-hub-tenant/odh-workbench-che-code-cpu-py312-ubi9:on-pr-{{revision}}
  - name: image-expires-after
    value: 5d
  - name: build-platforms
    value:
    - linux-d160-m4xlarge/amd64
    - linux-d160-m4xlarge/arm64
  - name: dockerfile
    value: codeserver/che-code-ubi9-python-3.12/Dockerfile.konflux.cpu
  - name: path-context
    value: .
  - name: build-args-file
    value: codeserver/che-code-ubi9-python-3.12/build-args/cpu.conf
  - name: hermetic
    value: 'false'
  pipelineRef:
    name: multiarch-odh-main-combined-pipeline
  taskRunTemplate:
    serviceAccountName: build-pipeline-odh-workbench-che-code-cpu-py312-ubi9
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
