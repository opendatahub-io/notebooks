---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/opendatahub-io/notebooks?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    build.appstudio.openshift.io/build-nudge-files: "manifests/base/params-latest.env"
    pipelinesascode.tekton.dev/on-cel-expression: event == "push" && target_branch == "stable" && !("manifests/base/params-latest.env".pathChanged()) && ( ".tekton/odh-workbench-jupyter-pytorch-cuda-py312-ubi9-ci-push.yaml".pathChanged() || "jupyter/pytorch/ubi9-python-3.12/**".pathChanged() || "cuda/**".pathChanged() || "jupyter/utils/**".pathChanged() || "jupyter/minimal/ubi9-python-3.12/start-notebook.sh".pathChanged() || "jupyter/datascience/ubi9-python-3.12/mongodb-org-6.0.repo-x86_64/**".pathChanged() || "jupyter/datascience/ubi9-python-3.12/mssql-2022.repo-x86_64/**".pathChanged() || "jupyter/datascience/ubi9-python-3.12/setup-elyra.sh".pathChanged() || "jupyter/pytorch/ubi9-python-3.12/build-args/cuda.conf".pathChanged() )
  labels:
    appstudio.openshift.io/application: opendatahub-builds
    appstudio.openshift.io/component: odh-workbench-jupyter-pytorch-cuda-py312-ubi9-ci
    pipelines.appstudio.openshift.io/type: build
  name: odh-workbench-jupyter-pytorch-cuda-py312-ubi9-ci-on-push
  namespace: open-data-hub-tenant
spec:
  timeouts:
    pipeline: 8h
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/opendatahub/odh-workbench-jupyter-pytorch-cuda-py312-ubi9:odh-stable
  - name: dockerfile
    value: jupyter/pytorch/ubi9-python-3.12/Dockerfile.cuda
  - name: build-args-file
    value: jupyter/pytorch/ubi9-python-3.12/build-args/cuda.conf
  - name: path-context
    value: .
  # Hermetic: gomod (mongocli), RPM+generic (prefetch-input/odh), pip (requirements.cuda.txt)
  - name: hermetic
    value: 'true'
  - name: prefetch-input
    value:
    - path: prefetch-input/mongocli
      type: gomod
    - path: prefetch-input/odh
      type: rpm
    - path: prefetch-input/odh
      type: generic
    - path: jupyter/pytorch/ubi9-python-3.12
      type: pip
      binary:
        arch: x86_64
      requirements_files: [requirements.cuda.txt]
  - name: additional-tags
    value:
    - 3.5_ea1-v1.44
  taskRunSpecs:
  - pipelineTaskName: prefetch-dependencies
    computeResources:
      requests:
        cpu: '8'
        memory: 32Gi
      limits:
        cpu: '8'
        memory: 32Gi
  - pipelineTaskName: build-images
    stepSpecs:
    - name: prepare-sboms
      computeResources:
        requests:
          cpu: '8'
          memory: 32Gi
        limits:
          cpu: '8'
          memory: 32Gi
    - name: sbom-syft-generate
      computeResources:
        requests:
          cpu: '8'
          memory: 32Gi
        limits:
          cpu: '8'
          memory: 32Gi
    - name: build
      computeResources:
        requests:
          cpu: '8'
          memory: 16Gi
        limits:
          cpu: '16'
          memory: 32Gi
  - pipelineTaskName: clair-scan
    computeResources:
      limits:
        memory: 32Gi
  - pipelineTaskName: ecosystem-cert-preflight-checks
    computeResources:
      limits:
        memory: 8Gi
  - pipelineTaskName: sast-unicode-check
    computeResources:
      limits:
        memory: 8Gi
  - pipelineTaskName: sast-shell-check
    computeResources:
      limits:
        memory: 8Gi
  - pipelineTaskName: clamav-scan
    computeResources:
      limits:
        memory: 8Gi
  - pipelineTaskName: rpms-signature-scan
    computeResources:
      limits:
        memory: 8Gi
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/opendatahub-io/odh-konflux-central.git
    - name: revision
      value: main
    - name: pathInRepo
      value: pipeline/multi-arch-container-build.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-odh-workbench-jupyter-pytorch-cuda-py312-ubi9
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
