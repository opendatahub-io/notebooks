apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/opendatahub-io/notebooks?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: 'false'
    pipelinesascode.tekton.dev/max-keep-runs: '3'
    build.appstudio.openshift.io/build-nudge-files: manifests/base/params-latest.env
    pipelinesascode.tekton.dev/on-cel-expression: >-
      event == "push" && target_branch == "main"
      && !("manifests/base/params-latest.env".pathChanged())
      && (
      ".tekton/odh-workbench-jupyter-trustyai-cpu-py312-ubi9-odh-main-push.yaml".pathChanged()
      || "jupyter/trustyai/ubi9-python-3.12/**".pathChanged()
      || "jupyter/datascience/ubi9-python-3.12/**".pathChanged()
      || "jupyter/utils/**".pathChanged()
      || "jupyter/minimal/ubi9-python-3.12/start-notebook.sh".pathChanged()
      || "jupyter/datascience/ubi9-python-3.12/mongodb-org-6.0.repo-x86_64/**".pathChanged()
      || "jupyter/datascience/ubi9-python-3.12/mssql-2022.repo-x86_64/**".pathChanged()
      || "jupyter/datascience/ubi9-python-3.12/setup-elyra.sh".pathChanged()
      || "jupyter/trustyai/ubi9-python-3.12/build-args/cpu.conf".pathChanged()
      || "prefetch-input/mongocli/**".pathChanged()
      || "prefetch-input/odh/rpms.lock.yaml".pathChanged()
      )
  creationTimestamp:
  labels:
    appstudio.openshift.io/application: opendatahub-release
    appstudio.openshift.io/component: odh-workbench-jupyter-trustyai-cpu-py312-ubi9
    pipelines.appstudio.openshift.io/type: build
  name: odh-workbench-jupyter-trustyai-cpu-py312-ubi9-odh-main-push
  namespace: open-data-hub-tenant
spec:
  timeouts:
    pipeline: 8h
  params:
  - name: event-type
    value: '{{event_type}}'
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/opendatahub/odh-workbench-jupyter-trustyai-cpu-py312-ubi9:{{revision}}
  - name: build-platforms
    value:
    - linux-d160-m2xlarge/amd64
    - linux-d160-m2xlarge/arm64
    - linux/ppc64le
    - linux/s390x
  - name: dockerfile
    value: jupyter/trustyai/ubi9-python-3.12/Dockerfile.cpu
  - name: build-args-file
    value: jupyter/trustyai/ubi9-python-3.12/build-args/cpu.conf
  - name: path-context
    value: .
  # Hermetic: Cachi2 prefetches gomod (mongocli), RPMs+generic (shared minimal/odh), pip (datascience + trustyai requirements.cpu.txt)
  - name: hermetic
    value: 'true'
  - name: prefetch-input
    value:
    - path: prefetch-input/mongocli
      type: gomod
    - path: prefetch-input/odh
      type: rpm
    - path: prefetch-input/odh
      type: generic
    - path: jupyter/trustyai/ubi9-python-3.12
      type: pip
      binary:
        arch: x86_64, aarch64, ppc64le, s390x
      requirements_files: [requirements.cpu.txt]
  - name: additional-tags
    value:
    - '{{target_branch}}-{{revision}}'
  pipelineRef:
    name: multiarch-odh-main-combined-pipeline
  taskRunTemplate:
    serviceAccountName: build-pipeline-odh-workbench-jupyter-trustyai-cpu-py312-ubi9
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
  taskRunSpecs:
  - pipelineTaskName: prefetch-dependencies
    computeResources:
      requests:
        cpu: '4'
        memory: 8Gi
      limits:
        cpu: '4'
        memory: 8Gi
  - pipelineTaskName: build-images
    stepSpecs:
    - name: use-trusted-artifact
      computeResources:
        requests:
          cpu: '4'
          memory: 8Gi
        limits:
          cpu: '4'
          memory: 8Gi
    - name: prepare-sboms
      computeResources:
        requests:
          cpu: '4'
          memory: 8Gi
        limits:
          cpu: '4'
          memory: 8Gi
    - name: sbom-syft-generate
      computeResources:
        requests:
          cpu: '4'
          memory: 8Gi
        limits:
          cpu: '4'
          memory: 8Gi
    - name: build
      computeResources:
        requests:
          cpu: '4'
          memory: 8Gi
        limits:
          cpu: '4'
          memory: 8Gi
  - pipelineTaskName: rpms-signature-scan
    computeResources:
      requests:
        cpu: '4'
        memory: 8Gi
      limits:
        cpu: '4'
        memory: 8Gi
  - pipelineTaskName: sast-unicode-check
    computeResources:
      requests:
        cpu: '4'
        memory: 8Gi
      limits:
        cpu: '4'
        memory: 8Gi
  - pipelineTaskName: sast-snyk-check
    computeResources:
      requests:
        cpu: '4'
        memory: 8Gi
      limits:
        cpu: '4'
        memory: 8Gi
  - pipelineTaskName: ecosystem-cert-preflight-checks
    computeResources:
      requests:
        cpu: '4'
        memory: 8Gi
      limits:
        cpu: '4'
        memory: 8Gi
  - pipelineTaskName: sast-shell-check
    computeResources:
      requests:
        cpu: '4'
        memory: 8Gi
      limits:
        cpu: '4'
        memory: 8Gi
status: {}
