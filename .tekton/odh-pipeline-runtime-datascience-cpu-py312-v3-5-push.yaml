apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/red-hat-data-services/notebooks?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    build.appstudio.openshift.io/build-nudge-files: "build/operator-nudging.yaml"
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "push"
      && target_branch == "rhoai-3.5"
      && !("manifests/base/params-latest.env".pathChanged())
      && ( "runtimes/datascience/ubi9-python-3.12/**".pathChanged() || ".tekton/odh-pipeline-runtime-datascience-cpu-py312-v3-5-push.yaml".pathChanged() )
  labels:
    appstudio.openshift.io/application: rhoai-v3-5
    appstudio.openshift.io/component: odh-pipeline-runtime-datascience-cpu-py312-v3-5
    pipelines.appstudio.openshift.io/type: build
  name: odh-pipeline-runtime-datascience-cpu-py312-v3-5-on-push
  namespace: rhoai-tenant
spec:
  timeouts:
    pipeline: 8h
    tasks: 4h
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: additional-tags
    value:
    - '{{target_branch}}-{{revision}}'
  - name: output-image
    value: quay.io/rhoai/odh-pipeline-runtime-datascience-cpu-py312-rhel9:{{target_branch}}
  - name: rhoai-version
    value: "3.5.0"
  - name: dockerfile
    value: runtimes/datascience/ubi9-python-3.12/Dockerfile.konflux.cpu
  - name: path-context
    value: .
  - name: enable-cache-proxy
    value: true
  - name: hermetic
    value: false
  - name: build-source-image
    value: true
  - name: build-image-index
    value: true
  - name: build-platforms
    value:
    - linux/x86_64
    - linux-m2xlarge/arm64
    - linux/ppc64le
    - linux/s390x
  - name: build-args-file
    value: runtimes/datascience/ubi9-python-3.12/build-args/konflux.cpu.conf
  - name: rhel-subscription-activation-key
    value: rhel-subscription-activation-key-rhoai-devops-for-notebooks-rhel9-6
  - name: prefetch-input
    value:
    - path: prefetch-input/rhds
      type: rpm
    - path: runtimes/datascience/ubi9-python-3.12
      type: pip
      binary:
        arch: "x86_64,aarch64,ppc64le,s390x"
      requirements_files: [requirements.cpu.txt]
  - name: fips-check-blocking
    value: "false"
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/red-hat-data-services/konflux-central.git
    - name: revision
      value: '{{ target_branch }}'
    - name: pathInRepo
      value: pipelines/multi-arch-container-build.yaml
  taskRunSpecs:
  - pipelineTaskName: prefetch-dependencies
    computeResources:
      requests:
        cpu: '3'
        memory: 8Gi
      limits:
        cpu: '3'
        memory: 8Gi
  - pipelineTaskName: build-images
    stepSpecs:
    - name: prepare-sboms
      computeResources:
        requests:
          cpu: '3'
          memory: 8Gi
        limits:
          cpu: '3'
          memory: 8Gi
    - name: sbom-syft-generate
      computeResources:
        requests:
          cpu: '3'
          memory: 8Gi
        limits:
          cpu: '3'
          memory: 8Gi
    - name: build
      computeResources:
        requests:
          cpu: '3'
          memory: 8Gi
        limits:
          cpu: '3'
          memory: 8Gi
  - pipelineTaskName: clair-scan
    computeResources:
      requests:
        cpu: '3'
        memory: 8Gi
      limits:
        cpu: '3'
        memory: 8Gi
  - pipelineTaskName: ecosystem-cert-preflight-checks
    computeResources:
      requests:
        cpu: '3'
        memory: 8Gi
      limits:
        cpu: '3'
        memory: 8Gi
  taskRunTemplate:
    serviceAccountName: build-pipeline-odh-pipeline-runtime-datascience-cpu-py312-v3-5
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
