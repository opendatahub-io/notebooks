---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/opendatahub-io/notebooks?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    build.appstudio.openshift.io/build-nudge-files: "manifests/base/params-latest.env"
    pipelinesascode.tekton.dev/on-cel-expression: event == "push" && target_branch == "stable" && !("manifests/base/params-latest.env".pathChanged()) && ( ".tekton/odh-workbench-che-code-cpu-py312-ubi9-ci-push.yaml".pathChanged() || "codeserver/che-code-ubi9-python-3.12/**".pathChanged() )
  labels:
    appstudio.openshift.io/application: opendatahub-builds
    appstudio.openshift.io/component: odh-workbench-che-code-cpu-py312-ubi9-ci
    pipelines.appstudio.openshift.io/type: build
  name: odh-workbench-che-code-cpu-py312-ubi9-ci-on-push
  namespace: open-data-hub-tenant
spec:
  timeouts:
    pipeline: 6h
  params:
  - name: event-type
    value: '{{event_type}}'
  - name: enable-cache-proxy
    value: 'true'
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/open-data-hub-tenant/odh-workbench-che-code-cpu-py312-ubi9:odh-stable
  - name: dockerfile
    value: codeserver/che-code-ubi9-python-3.12/Dockerfile.konflux.cpu
  - name: build-args-file
    value: codeserver/che-code-ubi9-python-3.12/build-args/cpu.conf
  - name: hermetic
    value: 'false'
  - name: path-context
    value: .
  - name: additional-tags
    value:
    - 3.6_ea1-v1.47
  - name: build-platforms
    value:
    - linux-d160-m4xlarge/amd64
    - linux-d160-m4xlarge/arm64
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/opendatahub-io/odh-konflux-central.git
    - name: revision
      value: main
    - name: pathInRepo
      value: pipeline/multi-arch-container-build.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-odh-workbench-che-code-cpu-py312-ubi9
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
