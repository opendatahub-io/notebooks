---
name: Test Build Notebooks Template

permissions:
  contents: read
  packages: write

"on":
  push:
    branches: ['rhoai-*']
    paths: &template-self-test-paths
      - '.github/workflows/build-notebooks-TEMPLATE.yaml'
      - '.github/workflows/test-build-notebooks-template.yaml'
      - '.github/actions/install-podman-action/**'
      - '.github/actions/provision-k8s/**'
      - 'ci/cached-builds/**'
      - 'Makefile'
  pull_request:
    paths: *template-self-test-paths
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-template-minimal:
    name: Test Template with Minimal Notebook
    uses: ./.github/workflows/build-notebooks-TEMPLATE.yaml
    with:
      target: jupyter-minimal-ubi9-python-3.12
      python: "3.12"
      github: ${{ toJson(github) }}
      platform: linux/amd64
      # Match downstream/main: self-test uses a public-base image and must not
      # require subscription secrets (unavailable on fork PRs).
      subscription: ${{ false }}
      product: rhoai
    secrets: inherit
