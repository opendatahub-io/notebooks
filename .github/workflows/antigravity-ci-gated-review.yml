---
name: '🛡️ Antigravity CI-Gated Review'

"on":
  workflow_run:
    workflows:
      - 'Build Notebooks (pr)'
    types:
      - 'completed'

concurrency:
  group: 'antigravity-ci-gated-review-${{ github.event.workflow_run.id }}'
  cancel-in-progress: true

jobs:
  review:
    if: |-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 12
    permissions:
      actions: 'read'
      contents: 'read'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Mint identity token'
        id: 'mint_identity_token'
        if: |-
          ${{ vars.APP_ID }}
        uses: 'actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b'  # v2.1.1
        with:
          app-id: '${{ vars.APP_ID }}'
          private-key: '${{ secrets.APP_PRIVATE_KEY }}'
          permission-actions: 'read'
          permission-contents: 'read'
          permission-issues: 'write'
          permission-pull-requests: 'write'

      - name: 'Checkout repository'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd'  # v6.0.2

      - name: 'Setup uv and Python'
        uses: './.github/actions/setup-uv'

      - name: 'Install from uv.lock (project + dev deps)'
        run: 'uv sync --locked'

      - name: 'Prepare review context'
        if: |-
          ${{ github.event.workflow_run.pull_requests[0].number }}
        env:
          ADDITIONAL_CONTEXT: 'CI-gated follow-up review after a successful notebook matrix build.'
          GITHUB_REPOSITORY: '${{ github.repository }}'
          GITHUB_TOKEN: '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}'
          PULL_REQUEST_NUMBER: '${{ github.event.workflow_run.pull_requests[0].number }}'
          REVIEW_CONTEXT_PATH: 'review-context.json'
        run: 'uv run python scripts/ci/prepare_review_context.py'

      - name: 'Run CI-gated Antigravity review'
        if: |-
          ${{ github.event.workflow_run.pull_requests[0].number }}
        env:
          ADDITIONAL_CONTEXT: 'CI-gated follow-up review after a successful notebook matrix build.'
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
          GEMINI_MODEL: '${{ vars.GEMINI_MODEL }}'
          GITHUB_REPOSITORY: '${{ github.repository }}'
          GITHUB_TOKEN: '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}'
          PULL_REQUEST_NUMBER: '${{ github.event.workflow_run.pull_requests[0].number }}'
          REVIEW_CONTEXT_PATH: 'review-context.json'
        run: 'uv run python scripts/ci/review_pr.py'
