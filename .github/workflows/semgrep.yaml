---
name: Semgrep

"on":
  push:
    branches:
      - main
      - stable
      - 'rhoai-*'
  pull_request:
  schedule:
    - cron: '0 3 * * 2'
  workflow_dispatch:

concurrency:
  group: semgrep-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scan:
    name: Semgrep scan
    runs-on: ubuntu-24.04
    env:
      SEMGREP_VERSION: '1.163.0'
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Cache Semgrep
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.local/pipx/venvs/semgrep
          key: ${{ runner.os }}-pipx-semgrep-${{ env.SEMGREP_VERSION }}

      - name: Install Semgrep
        run: pipx install semgrep==${{ env.SEMGREP_VERSION }}

      - name: Run Semgrep
        id: run-semgrep
        run: semgrep scan --config semgrep.yaml --sarif-output=semgrep.sarif

      - name: Upload SARIF
        # Fork PRs cannot write security-events; skip upload (same guard as gitleaks.yaml).
        if: ${{ !cancelled() && (steps.run-semgrep.outcome == 'success' || steps.run-semgrep.outcome == 'failure') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        with:
          sarif_file: semgrep.sarif
