---
name: Semgrep

"on":
  push:
    branches:
      - main
      - stable
      - 'rhoai-*'
  pull_request:
  schedule:
    - cron: '0 3 * * 2'
  workflow_dispatch:

concurrency:
  group: semgrep-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scan:
    name: Semgrep scan
    runs-on: ubuntu-24.04
    env:
      SEMGREP_VERSION: '1.163.0'
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Cache Semgrep
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.local/pipx/venvs/semgrep
          key: ${{ runner.os }}-pipx-semgrep-${{ env.SEMGREP_VERSION }}

      - name: Install Semgrep
        run: pipx install semgrep==${{ env.SEMGREP_VERSION }}

      - name: Run Semgrep
        id: run-semgrep
        run: semgrep scan --config semgrep.yaml --sarif-output=semgrep.sarif

      - name: Upload SARIF
        # Fork PRs cannot write security-events; skip upload (same guard as gitleaks.yaml).
        if: ${{ !cancelled() && (steps.run-semgrep.outcome == 'success' || steps.run-semgrep.outcome == 'failure') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          sarif_file: semgrep.sarif
