---
"name": "Build Notebooks (pr)"
"on":
  "pull_request":
    "paths-ignore":
      # Don't build images if the only thing that changed is image digests in manifests
      - manifests/base/params-latest.env
      - manifests/base/params.env
      # In fact, skip the build if there are only changes in manifests and nowhere else
      - manifests/**

permissions:
  contents: read
  packages: read
  pull-requests: read

concurrency:
  group: ${{ format('build-notebooks-pr-{0}', github.event.pull_request.number) }}
  cancel-in-progress: true

jobs:
  gen:
    name: Generate job matrix
    runs-on: ubuntu-26.04
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      has_jobs: ${{ steps.gen.outputs.has_jobs }}
      is_fork: ${{ steps.fork-check.outputs.is_fork }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false  # https://github.com/actions/checkout/issues/2312

      - name: Check if PR is from a fork
        id: fork-check
        env:
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
        run: |
          if [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            echo "is_fork=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Flag fork PR in workflow summary
        if: steps.fork-check.outputs.is_fork == 'true'
        run: |
          echo "::error title=Fork PR — subscription builds will fail::This PR is from a fork. Subscription builds (RHEL, AIPCC) need secrets unavailable to forks. Push your branch to the main repo for full CI."

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: scripts/buildinputs/go.mod
          cache-dependency-path: scripts/buildinputs/go.mod

      - name: Determine targets to build based on changed files
        run: |
          set -x
          git fetch --no-tags origin "pull/${PR_NUMBER}/head:${HEAD_REF}"
          git fetch --no-tags origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
          python3 ci/cached-builds/gen_gha_matrix_jobs.py \
            --from-ref "origin/${BASE_REF}" \
            --to-ref "${HEAD_REF}" \
            --rhel-images include \
            --s390x-images include
        id: gen
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        shell: bash

      - name: Annotate PR for fork guidance
        if: steps.fork-check.outputs.is_fork == 'true'
        run: |
          FIRST_FILE=$(git diff --name-only "origin/${BASE_REF}...${HEAD_REF}" | head -1)
          FIRST_FILE="${FIRST_FILE:-CONTRIBUTING.md}"
          echo "::warning file=${FIRST_FILE},line=1,title=Fork PR — subscription builds will fail::Push your branch to the main repo for full CI. See CONTRIBUTING.md."
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}

  build:
    name: "${{ matrix.target }} · ${{ matrix.platform }} [rhoai]"
    needs: ["gen"]
    strategy:
      fail-fast: false
      matrix: "${{ fromJson(needs.gen.outputs.matrix) }}"
    uses: ./.github/workflows/build-notebooks-TEMPLATE.yaml
    if: ${{ fromJson(needs.gen.outputs.has_jobs) }}
    with:
      target: "${{ matrix.target }}"
      python: "${{ matrix.python }}"
      github: "${{ toJSON(github) }}"
      platform: "${{ matrix.platform }}"
      # Hermetic codeserver on rhoai-2.25 uses public UBI9 + public RPM/PyPI locks —
      # no RHEL subscription / AIPCC quay / git-crypt secrets required. Other RHOAI
      # targets still need them (AIPCC bases). Matrix "subscription" is only true
      # for *rhel* targets; keep forcing it for non-codeserver RHOAI images.
      subscription: ${{ !contains(matrix.target, 'codeserver') }}
      product: rhoai
    secrets: inherit
