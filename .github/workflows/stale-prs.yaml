---
name: Mark stale PRs
on:  # yamllint disable-line rule:truthy
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  pull-requests: write
jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f  # v10.2.0
        with:
          stale-pr-message: "This PR is stale due to inactivity. Please update the PR to keep it alive. Otherwise, it will be closed after 14 days."
          days-before-stale: 100
          days-before-close: 14
          stale-pr-label: "stale"
          close-pr-label: "rotten"
