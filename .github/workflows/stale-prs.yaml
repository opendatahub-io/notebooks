---
name: Mark stale PRs
on:  # yamllint disable-line rule:truthy
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  issues: write
  pull-requests: write
jobs:
  stale:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899  # v10.3.0
        with:
          stale-pr-message: "This PR is stale due to inactivity. Please update the PR to keep it alive. Otherwise, it will be closed after 14 days."
          days-before-issue-stale: -1
          days-before-issue-close: -1
          days-before-pr-stale: 100
          days-before-pr-close: 14
          stale-pr-label: "stale"
          close-pr-label: "rotten"
          operations-per-run: 300
          sort-by: updated
          ascending: true
