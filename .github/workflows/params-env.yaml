---
name: Validation of image references (image SHAs) in params.env and runtime images
on:  # yamllint disable-line rule:truthy
  push:
  pull_request:
    paths:
      - 'manifests/base/commit.env'
      - 'manifests/base/params.env'
      - 'manifests/base/commit-latest.env'
      - 'manifests/base/params-latest.env'
      - 'ci/check-params-env.sh'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validation-of-params-env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get install -y skopeo jq git-crypt

      - name: Unlock encrypted secrets with git-crypt
        run: |
          echo "${GIT_CRYPT_KEY}" | base64 --decode > ./git-crypt-key
          git-crypt unlock ./git-crypt-key
          rm ./git-crypt-key
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}

      - name: Configure skopeo auth from pull-secret
        run: |
          mkdir -p "$HOME/.config/containers"
          cp ci/secrets/pull-secret.json "$HOME/.config/containers/auth.json"

      - name: Configure Quay.io pull auth for RHOAI namespace
        if: env.RHOAI_QUAY_BOT_USERNAME != ''
        run: |
          printf '%s' "${RHOAI_QUAY_BOT_PASSWORD}" | skopeo login --username "${RHOAI_QUAY_BOT_USERNAME}" --password-stdin quay.io
        env:
          RHOAI_QUAY_BOT_USERNAME: ${{ secrets.RHOAI_QUAY_BOT_USERNAME }}
          RHOAI_QUAY_BOT_PASSWORD: ${{ secrets.RHOAI_QUAY_BOT_PASSWORD }}

      - name: Validate the 'manifests/base/params.env' file content
        run: |
          bash ./ci/check-params-env.sh
