---
name: Validation of software versions referenced in ImageStream manifests
on:  # yamllint disable-line rule:truthy
  push:
    branches: [main, stable, 'rhoai-*']
    # We use a YAML anchor (&trigger_paths) and alias (*trigger_paths) to deduplicate paths.
    # Docs: https://yaml.org/spec/1.2.2/#3222-anchors-and-aliases
    # Tutorial & Gotchas: https://frenck.dev/github-actions-yaml-anchors-aliases-merge-keys/
    paths: &trigger_paths
      - '.github/workflows/software-versions.yaml'
      - '.github/actions/apt-install/**'
      - '.github/actions/setup-uv/**'
      - 'manifests/odh/base/params.env'
      - 'manifests/odh/base/*-imagestream.yaml'
      - 'manifests/rhoai/base/params.env'
      - 'manifests/rhoai/base/*-imagestream.yaml'
      - 'pytest.ini'
      - 'tests/containers/manifest_validation_test.py'
  pull_request:
    paths: *trigger_paths
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  validation-of-sw-versions-in-imagestreams:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install dependencies
        uses: ./.github/actions/apt-install
        with:
          packages: skopeo git-crypt
          update: 'false'

      - name: Install cosign
        run: |
          curl -fsSL https://github.com/sigstore/cosign/releases/download/v2.5.0/cosign-linux-amd64 -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign

      - name: Setup uv and Python
        uses: ./.github/actions/setup-uv

      - name: Unlock encrypted secrets with git-crypt
        run: |
          echo "${GIT_CRYPT_KEY}" | base64 --decode > ./git-crypt-key
          trap 'rm -f ./git-crypt-key' EXIT
          git-crypt unlock ./git-crypt-key
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}

      - name: Configure registry auth from pull-secret
        run: |
          mkdir -p "$HOME/.config/containers"
          cp ci/secrets/pull-secret.json "$HOME/.config/containers/auth.json"
          mkdir -p "$HOME/.docker"
          cp ci/secrets/pull-secret.json "$HOME/.docker/config.json"

      - name: Validate manifest annotations against image SBOMs
        run: |
          uv run pytest tests/containers/manifest_validation_test.py::test_old_tag_annotations_match_sbom -v
