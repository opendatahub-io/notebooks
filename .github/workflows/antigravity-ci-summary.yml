---
name: '🧠 Antigravity CI Summary'

"on":
  workflow_job:
    types:
      - 'completed'

concurrency:
  group: 'ci-summary-${{ github.event.workflow_run.id }}'
  cancel-in-progress: true

jobs:
  update:
    if: |-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.name == 'Build Notebooks (pr)' &&
      github.event.workflow_job.conclusion != 'skipped'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 12
    permissions:
      actions: 'read'
      contents: 'read'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Mint identity token'
        id: 'mint_identity_token'
        if: |-
          ${{ vars.APP_ID }}
        uses: 'actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b'  # v2.1.1
        with:
          app-id: '${{ vars.APP_ID }}'
          private-key: '${{ secrets.APP_PRIVATE_KEY }}'
          permission-actions: 'read'
          permission-contents: 'read'
          permission-issues: 'write'
          permission-pull-requests: 'write'

      - name: 'Checkout repository'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd'  # v6.0.2

      - name: 'Setup uv and Python'
        uses: './.github/actions/setup-uv'

      - name: 'Install from uv.lock (project + dev deps)'
        run: 'uv sync --locked'

      - name: 'Prepare CI run context'
        id: 'prep'
        env:
          COMMENT_BODY_PATH: 'ci-comment-body.md'
          CI_RUN_CONTEXT_PATH: 'ci-run-context.json'
          GITHUB_REPOSITORY: '${{ github.repository }}'
          GITHUB_TOKEN: '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}'
          TRIGGER_JOB_ID: '${{ github.event.workflow_job.id }}'
          WORKFLOW_RUN_ID: '${{ github.event.workflow_run.id }}'
        run: 'uv run python scripts/ci/prepare_ci_run_context.py'

      - name: 'Summarize CI run'
        if: |-
          ${{ steps.prep.outputs.mode != 'progress' }}
        env:
          COMMENT_BODY_PATH: 'ci-comment-body.md'
          CI_RUN_CONTEXT_PATH: 'ci-run-context.json'
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
          GEMINI_MODEL: '${{ vars.GEMINI_MODEL }}'
          GITHUB_REPOSITORY: '${{ github.repository }}'
          GITHUB_TOKEN: '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}'
          SUMMARIZE_MODE: '${{ steps.prep.outputs.mode }}'
        run: 'uv run python scripts/ci/summarize_ci_run.py'

      - name: 'Upsert CI summary comment'
        env:
          COMMENT_BODY_PATH: 'ci-comment-body.md'
          CI_RUN_CONTEXT_PATH: 'ci-run-context.json'
          GITHUB_TOKEN: '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}'
        run: 'uv run python scripts/ci/upsert_ci_comment.py'
