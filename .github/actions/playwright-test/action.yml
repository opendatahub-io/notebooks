---
name: 'Playwright Browser Tests'
description: |
  Run Playwright browser tests for workbench images.

  Features:
  - Runs Playwright tests inside the official Microsoft Playwright container
  - Uses Podman to run the test container with proper isolation
  - Supports testcontainers for container orchestration
  - Uploads test reports as artifacts on pull requests

  Requirements:
  - Podman must be installed and running
  - The workbench image must be available in the local Podman storage
  - tests/browser directory must contain the Playwright test configuration

inputs:
  test-target:
    description: 'The workbench image to test (full image reference).'
    required: true
  podman-socket:
    description: 'Path to Podman socket'
    required: false
    default: '/var/run/podman/podman.sock'
  playwright-version:
    description: 'Version of the Playwright container to use (e.g., v1.58.1-noble). If not provided, extracted from package.json5'
    required: false
    default: ''
  working-directory:
    description: 'Directory containing the Playwright tests'
    required: false
    default: 'tests/browser'
  upload-report:
    description: 'Whether to upload the Playwright HTML report as an artifact'
    required: false
    default: 'false'
  upload-junit:
    description: 'Whether to upload the Playwright JUnit XML report as an uncompressed artifact'
    required: false
    default: 'true'
  artifact-name:
    description: 'Name for the uploaded HTML report artifact (required if upload-report is true)'
    required: false
    default: 'playwright-report'
  junit-artifact-file:
    description: 'Filename for the uploaded JUnit XML (upload-artifact v7 archive:false uses the filename as the artifact name)'
    required: false
    default: ''
  artifact-retention-days:
    description: 'Number of days to retain the HTML report artifact'
    required: false
    default: '30'
  junit-retention-days:
    description: 'Number of days to retain the JUnit XML artifact'
    required: false
    default: '14'
  grep-pattern:
    description: 'Grep pattern passed to --grep to filter tests (e.g. "@codeserver", "@smoke"). Empty string runs all tests.'
    required: false
    default: ''

outputs:
  outcome:
    description: 'The outcome of the Playwright tests (success or failure)'
    value: ${{ steps.playwright.outcome }}

runs:
  using: 'composite'
  steps:
    - name: Determine Playwright version
      id: playwright-version
      shell: bash
      run: |
        set -Eeuxo pipefail
        if [[ -n "${INPUT_PLAYWRIGHT_VERSION}" ]]; then
          echo "version=${INPUT_PLAYWRIGHT_VERSION}" >> "$GITHUB_OUTPUT"
        else
          # Extract version from package.json5 or package.json (single source of truth)
          pkg_file="${WORKING_DIRECTORY}/package.json5"
          if [[ ! -f "${pkg_file}" ]]; then
            pkg_file="${WORKING_DIRECTORY}/package.json"
          fi
          # package.json5 has: "@playwright/test": "=1.59.1"
          # Container tag format is: v1.59.1-noble
          PKG_VERSION=$(grep -oP "['\"]@playwright/test['\"]\s*:\s*['\"]=*\K[0-9.]+" "${pkg_file}")
          if [[ -z "$PKG_VERSION" ]]; then
            echo "::error::Failed to extract Playwright version from ${pkg_file}"
            exit 1
          fi
          echo "version=v${PKG_VERSION}-noble" >> "$GITHUB_OUTPUT"
          echo "Extracted Playwright version: v${PKG_VERSION}-noble"
        fi
      env:
        INPUT_PLAYWRIGHT_VERSION: ${{ inputs.playwright-version }}
        WORKING_DIRECTORY: ${{ inputs.working-directory }}

    - name: Determine pnpm version
      id: pnpm-version
      shell: bash
      run: |
        set -Eeuxo pipefail
        lockfile="${WORKING_DIRECTORY}/pnpm-lock.yaml"
        pkg_file="${WORKING_DIRECTORY}/package.json5"
        if [[ ! -f "${pkg_file}" ]]; then
          pkg_file="${WORKING_DIRECTORY}/package.json"
        fi
        if [[ -f scripts/get-pnpm-version.sh ]] && command -v yq >/dev/null 2>&1; then
          ver=$(scripts/get-pnpm-version.sh "${lockfile}")
        else
          ver=$(grep -oP '"packageManager"\s*:\s*"pnpm@\K[0-9.]+' "${pkg_file}")
        fi
        if [[ -z "${ver}" ]]; then
          echo "::error::Failed to resolve pnpm version from ${pkg_file} or ${lockfile}"
          exit 1
        fi
        echo "version=${ver}" >> "$GITHUB_OUTPUT"
        echo "Resolved pnpm version: ${ver}"
      env:
        WORKING_DIRECTORY: ${{ inputs.working-directory }}

    - name: Run Playwright tests
      id: playwright
      shell: bash
      # --ipc=host because Microsoft says so in Playwright docs
      # --net=host because testcontainers connects to the Reaper container's exposed port
      # we need to pass through the relevant environment variables
      #  DEBUG configures Node.js debuggers, sets different verbosity as needed
      #  CI=true is set on every CI nowadays
      #  PODMAN_SOCK should be mounted to /var/run/docker.sock, other likely mounting locations may not exist (mkdir -p)
      #  TEST_TARGET is the workbench image the test will run
      # --volume(s) let us access docker socket and not clobber host's node_modules
      run: |
        podman run \
          --interactive --rm \
          --ipc=host \
          --net=host \
          --env "CI=true" \
          --env "PNPM_CONFIG_fund=false" \
          --env "DEBUG=testcontainers:*" \
          --env "PODMAN_SOCK=/var/run/docker.sock" \
          --env "TEST_TARGET" \
          --env "GREP_PATTERN" \
          --env "PNPM_VERSION" \
          --volume "${PODMAN_SOCKET}":/var/run/docker.sock \
          --volume "${PWD}":/mnt \
          --volume /mnt/node_modules \
          "mcr.microsoft.com/playwright:${PLAYWRIGHT_VERSION}" \
          /bin/bash <<'EOF'
            set -Eeuxo pipefail
            cd /mnt
            npm install -g "pnpm@${PNPM_VERSION}" && (pnpm ci || pnpm install --frozen-lockfile)
            pnpm exec playwright test ${GREP_PATTERN:+--grep "$GREP_PATTERN"}
            exit 0
        EOF
      working-directory: ${{ inputs.working-directory }}
      env:
        # Only set TEST_TARGET if provided, otherwise playwright.config.ts uses its default
        TEST_TARGET: ${{ inputs.test-target || '' }}
        PODMAN_SOCKET: ${{ inputs.podman-socket }}
        PLAYWRIGHT_VERSION: ${{ steps.playwright-version.outputs.version }}
        PNPM_VERSION: ${{ steps.pnpm-version.outputs.version }}
        GREP_PATTERN: ${{ inputs.grep-pattern }}

    - name: Stage Playwright JUnit XML
      id: stage-junit
      if: ${{ !cancelled() && inputs.upload-junit == 'true' }}
      shell: bash
      run: |
        set -Eeuxo pipefail
        src="${WORKING_DIRECTORY}/results/junit.xml"
        if [[ -n "${JUNIT_ARTIFACT_FILE}" ]]; then
          artifact_file="${JUNIT_ARTIFACT_FILE}"
        else
          artifact_file="${ARTIFACT_NAME/_playwright-report/_playwright-junit.xml}"
          if [[ "${artifact_file}" == "${ARTIFACT_NAME}" ]]; then
            artifact_file="${ARTIFACT_NAME}-junit.xml"
          fi
        fi
        dest="${RUNNER_TEMP}/playwright-reports/${artifact_file}"
        mkdir -p "$(dirname "${dest}")"
        if [[ -f "${src}" ]]; then
          cp "${src}" "${dest}"
          echo "path=${dest}" >> "${GITHUB_OUTPUT}"
          echo "Staged Playwright JUnit XML at ${dest}"
        else
          echo "::warning::Playwright JUnit XML not found at ${src}"
        fi
      env:
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
        ARTIFACT_NAME: ${{ inputs.artifact-name }}
        JUNIT_ARTIFACT_FILE: ${{ inputs.junit-artifact-file }}

    - name: Upload Playwright JUnit XML
      if: ${{ always() && !cancelled() && inputs.upload-junit == 'true' && steps.stage-junit.outputs.path != '' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        path: ${{ steps.stage-junit.outputs.path }}
        archive: false
        retention-days: ${{ inputs.junit-retention-days }}
        if-no-files-found: warn

    - name: Upload Playwright report
      if: ${{ !cancelled() && inputs.upload-report == 'true' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.working-directory }}/playwright-report/
        retention-days: ${{ inputs.artifact-retention-days }}
