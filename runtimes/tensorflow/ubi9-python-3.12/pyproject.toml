[project]
name = "tensorflow-ubi9-python-3.12"
version = "0.1.0"
requires-python = "==3.12.*"

dependencies = [

    # TensorFlow packages
    "tensorflow",
    "tensorboard",

    # Datascience and useful extensions
    "codeflare-sdk",
    "feast",
    "odh-notebooks-meta-runtime-datascience-deps",

    "odh-notebooks-meta-db-connectors-deps",
    "odh-notebooks-meta-runtime-elyra-deps",

    # Base packages
    "wheel",
    "setuptools",

    # Hermetic bootstrap: locked in requirements.*.txt; Dockerfile installs unpinned from find-links.
    "micropipenv[toml]",
    "uv",
]

[tool.uv]

override-dependencies = [
    # AIPCC-13675: https://redhat.atlassian.net/browse/AIPCC-13675
    # https://github.com/tensorflow/tensorflow/blob/r2.21/requirements_lock_3_12.txt#L552
    "protobuf==6.31.1",
]

environments = [
    "sys_platform == 'linux' and implementation_name == 'cpython'",
]

[tool.uv.sources]
odh-notebooks-meta-runtime-elyra-deps = { path = "../../../dependencies/odh-notebooks-meta-runtime-elyra-deps" }
odh-notebooks-meta-runtime-datascience-deps = { path = "../../../dependencies/odh-notebooks-meta-runtime-datascience-deps" }
odh-notebooks-meta-db-connectors-deps = { path = "../../../dependencies/odh-notebooks-meta-db-connectors-deps" }
