[project]
name = "tensorflow-ubi9-python-3.12"
version = "0.1.0"
requires-python = "==3.12.*"

dependencies = [
    "tf2onnx~=1.16.1",

    # TensorFlow packages
    "tensorflow[and-cuda]~=2.20.0",
    "tensorboard~=2.20.0",

    # Datascience and useful extensions
    "boto3~=1.40.27",
    "kafka-python-ng~=2.2.3",
    "matplotlib~=3.10.6",
    "numpy~=2.1.3",
    "pandas~=2.3.2",
    "plotly~=6.3.0",
    "scikit-learn~=1.7.2",
    "scipy~=1.16.1",
    "skl2onnx~=1.19.1",
    # skl2onnx; onnxconverter-common~=1.16 required for ONNX 1.21+ (onnx.mapping removal)
    "onnxconverter-common~=1.16.0",
    "onnx>=1.21.0; platform_machine != 's390x'",  # CVE-2026-28500
    "codeflare-sdk~=0.31.2",
    "feast~=0.54.1",

    # DB connectors
    "pymongo~=4.14.1",
    "psycopg~=3.2.10",
    "pyodbc~=5.2.0",
    "mysql-connector-python~=9.4.0",

    # This is a comprehensive list of python dependencies that Elyra requires to execute Jupyter notebooks.
    "ipykernel~=6.30.1",
    "ipython~=9.5.0",
    "ipython-genutils~=0.2.0",
    "jinja2~=3.1.6",
    "jupyter-client~=8.6.3",
    "jupyter-core~=5.8.1",
    "markupsafe~=3.0.2",
    "minio~=7.2.16",
    "nbclient~=0.10.2",
    "nbconvert~=7.16.6",
    "nbformat~=5.10.4",
    "papermill~=2.6.0",
    "pyzmq~=27.1.0",
    "prompt-toolkit~=3.0.52",
    "requests~=2.32.5",
    "tornado~=6.5.2",
    "traitlets~=5.14.3",
    "urllib3~=2.6.0",

    # Base packages
    "setuptools~=80.9.0",
    "wheel~=0.46.2",
]

[tool.uv]

override-dependencies = [
    # RHAIENG-3211: CVE-2026-26007 cryptography Subgroup Attack
    "cryptography>=46.0.5",
    # tf2onnx has pinned protobuf version, that causes conflict with other packages
    "protobuf==6.31.1",
    "keras~=3.13.2",
    # RHAIENG-3209: CVE-2026-25990  Pillow: Out-of-bounds Write
    # Upstream: https://github.com/vllm-project/llm-compressor/releases/tag/0.7.1.1
    "pillow>=12.1.1",
]

environments = [
    "sys_platform == 'linux' and implementation_name == 'cpython'",
]
