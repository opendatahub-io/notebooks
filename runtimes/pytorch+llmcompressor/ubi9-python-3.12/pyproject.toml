[project]
name = "pytorch-llmcompressor-notebook"
version = "0.1.0"
requires-python = "==3.12.*"

dependencies = [
    # see https://redhat-internal.slack.com/archives/C079FE5H94J/p1756933987117709?thread_ts=1756933154.294109&cid=C079FE5H94J
    # for a discussion on what version of torch to use

    # PyTorch packages
    "tensorboard~=2.20.0",
    "torch==2.7.1",
    "torchvision==0.22.1",

    # llmcompressor stack (RHAIIS 3.2.2 model-opt/cuda-ubi9 — source of truth for RHOAI 2.25):
    # https://gitlab.com/redhat/rhel-ai/rhaiis/pipeline/-/blob/3.2.2/collections/model-opt/cuda-ubi9/requirements.txt
    # https://gitlab.com/redhat/rhel-ai/rhaiis/pipeline/-/blob/3.2.2/collections/model-opt/cuda-ubi9/constraints.txt
    # See jupyter/pytorch+llmcompressor/README.md for alignment notes and RHAIENG-6035.
    "llmcompressor==0.7.1.3",
    "lm-eval~=0.4.9",

    # Datascience and useful extensions
    "boto3~=1.40.27",
    "kafka-python-ng~=2.2.3",
    "matplotlib~=3.10.6",
    "numpy~=2.2.6",
    "pandas~=2.3.2",
    "plotly~=6.3.0",
    "scikit-learn~=1.7.2",
    "scipy~=1.16.1",
    "skl2onnx~=1.19.1",
    "onnxconverter-common~=1.16.0",  # ONNX 1.21+ (skl2onnx); was ~=1.13.0
    "onnx>=1.21.0; platform_machine != 's390x'",  # CVE-2026-28500
    "feast~=0.54.1",

    # DB connectors
    "pymongo~=4.14.1",
    "psycopg~=3.2.10",
    "pyodbc~=5.2.0",
    "mysql-connector-python~=9.4.0",

    # This is a comprehensive list of python dependencies that Elyra requires to execute Jupyter notebooks.
    "ipykernel~=6.30.1",
    "ipython~=9.5.0",
    "ipython-genutils~=0.2.0",
    "jinja2~=3.1.6",
    "jupyter-client~=8.6.3",
    "jupyter-core~=5.8.1",
    "markupsafe~=3.0.2",
    "minio~=7.2.16",
    "nbclient~=0.10.2",
    "nbconvert~=7.16.6",
    "nbformat~=5.10.4",
    "papermill~=2.6.0",
    "pyzmq~=27.1.0",
    "prompt-toolkit~=3.0.52",
    "requests==2.34.2",
    "tornado~=6.5.2",
    "traitlets~=5.14.3",
    "urllib3>=2.7.0",

    # Base packages
    "setuptools~=80.9.0",
    "wheel~=0.46.2",
]

[tool.uv.sources]
torch = { index = "pytorch-cuda" }
torchvision = { index = "pytorch-cuda" }

[[tool.uv.index]]
name = "pytorch-cuda"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.uv]

# RHAIIS uses constraints.txt only (no uv-style overrides). RHAIIS pins live in
# constraint-dependencies below; direct deps cover requests/urllib3 where needed.
override-dependencies = [
    # feast~=0.54.1 caps pyarrow<=17; RHAIIS constraints.txt requires pyarrow>=23 (CVE floor)
    "pyarrow>=23.0.1,<24.0.0",
]
# RHAIIS 3.2.2 collections/model-opt/cuda-ubi9/constraints.txt (+ llmcompressor in requirements.txt)
# https://gitlab.com/redhat/rhel-ai/rhaiis/pipeline/-/tree/3.2.2/collections/model-opt/cuda-ubi9
constraint-dependencies = [
    "loguru==0.7.3",
    "pyyaml==6.0.2",
    "numpy==2.2.6",
    "requests==2.34.2",
    "tqdm==4.67.1",
    # apicc is still on torch 2.7.1
    # "torch==2.8.0",
    "transformers==4.55.2",
    "datasets==4.0.0",
    "accelerate==1.10.0",
    "pynvml==12.0.0",
    "pillow==12.2.0",
    "urllib3>=2.7.0",
    "aiohttp>=3.14.0",
    "filelock>=3.20.3",
    "python-dotenv>=1.2.2",
    "pyarrow>=23.0.1,<24.0.0",
]

environments = [
    "python_version == '3.12' and sys_platform == 'linux' and platform_machine == 'x86_64'",
    # aarch64 omitted: lock resolution fails — torchvision==0.22.1+cu128 has no linux/aarch64 wheels
]
