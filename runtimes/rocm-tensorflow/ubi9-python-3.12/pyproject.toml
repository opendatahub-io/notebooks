[project]
name = "rocm-tensorflow-ubi9-python-3.12"
version = "0.1.0"
requires-python = "==3.12.*"

dependencies = [

    # ROCm TensorFlow packages
    # https://rocm.docs.amd.com/projects/install-on-linux/en/latest/install/3rd-party/tensorflow-install.html#using-a-wheels-package
    # TODO(jdanek): consider adding #sha256=814a5e4842b0c92d63c7a0bb4df0baf51ff2db8615535d83fe8958204b840598
    "tensorflow-rocm @ https://repo.radeon.com/rocm/manylinux/rocm-rel-6.4/tensorflow_rocm-2.18.1-cp312-cp312-manylinux_2_28_x86_64.whl",
    # tensorflow-rocm==2.x needs tensorboard>=2.x,<2.x+1
    "tensorboard",
    # ROCm TensorFlow extra PyPI packages (pinned)
    "odh-notebooks-meta-tensorflow-rocm-extrernal-deps",

    # Datascience and useful extensions
    "codeflare-sdk",
    "feast",
    "odh-notebooks-meta-runtime-datascience-deps",

    "odh-notebooks-meta-db-connectors-deps",
    "odh-notebooks-meta-runtime-elyra-deps",

    # Base packages
    "setuptools",
    "wheel",
]

[tool.uv]

override-dependencies = [
    # tensorflow-rocm depends on protobuf>=3.20.3, <6.0.0 and kfp depends on protobuf>=6.31.1
    "protobuf==6.31.1",
]

constraint-dependencies = [
    # cp312: onnx<1.19.0 has no compatible wheels and breaks skl2onnx resolution
    "onnx==1.20.0",
    # Universal lock otherwise forks pandas 2.3 vs 3.0 with inverted python_full_version
    # markers (uv bug/mis-emission); image is 3.12-only and manifests advertise Pandas 2.3.
    "pandas>=2.3,<3",
]

environments = [
    "sys_platform == 'linux' and implementation_name == 'cpython' and python_full_version < '3.13'",
]

[tool.uv.sources]
odh-notebooks-meta-runtime-elyra-deps = { path = "../../../dependencies/odh-notebooks-meta-runtime-elyra-deps" }
odh-notebooks-meta-runtime-datascience-deps = { path = "../../../dependencies/odh-notebooks-meta-runtime-datascience-deps" }
odh-notebooks-meta-db-connectors-deps = { path = "../../../dependencies/odh-notebooks-meta-db-connectors-deps" }
odh-notebooks-meta-tensorflow-rocm-extrernal-deps = { path = "../../../dependencies/odh-notebooks-meta-tensorflow-rocm-extrernal-deps" }
