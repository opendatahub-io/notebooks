[project]
name = "datascience-notebook"
version = "0.1.0"
requires-python = "==3.12.*"

dependencies = [
    # Datascience and useful extensions
    "odh-notebooks-meta-runtime-datascience-deps",

    "odh-notebooks-meta-db-connectors-deps",
    "odh-notebooks-meta-runtime-elyra-deps",
    "odh-notebooks-meta-runtime-kale-deps",

    # Base packages
    # RHAIENG-5847: >=80.9 emits pkg_resources UserWarning via google namespace packages
    "setuptools<80.9",
    "wheel",

    # Hermetic bootstrap: locked in requirements.*.txt; Dockerfile installs unpinned from find-links.
    "micropipenv[toml]",
    "uv",
]

[tool.uv]
# FIPS: exclude statically linked py-spy profiler (RHAIENG-58916)
exclude-dependencies = ["py-spy"]

environments = [
    "sys_platform == 'linux' and implementation_name == 'cpython' and python_full_version == '3.12.*'",
]
override-dependencies = [
    # AIPCC-13675: protobuf 6.33.6+ UPB C extension segfaults on s390x
    "protobuf==6.31.1",
]

[tool.uv.sources]
odh-notebooks-meta-runtime-elyra-deps = { path = "../../../dependencies/odh-notebooks-meta-runtime-elyra-deps" }
odh-notebooks-meta-runtime-datascience-deps = { path = "../../../dependencies/odh-notebooks-meta-runtime-datascience-deps" }
odh-notebooks-meta-runtime-kale-deps = { path = "../../../dependencies/odh-notebooks-meta-runtime-kale-deps" }
odh-notebooks-meta-db-connectors-deps = { path = "../../../dependencies/odh-notebooks-meta-db-connectors-deps" }