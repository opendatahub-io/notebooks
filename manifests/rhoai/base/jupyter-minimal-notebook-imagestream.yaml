---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  labels:
    opendatahub.io/notebook-image: "true"
  annotations:
    opendatahub.io/notebook-image-url: "https://github.com/red-hat-data-services/notebooks/tree/main/jupyter/minimal"
    opendatahub.io/notebook-image-name: "Jupyter | Minimal | CPU | Python 3.12"
    opendatahub.io/notebook-image-desc: "Jupyter notebook image with minimal dependency set to start experimenting with Jupyter environment."
    opendatahub.io/notebook-image-order: "4"
  name: s2i-minimal-notebook
spec:
  lookupPolicy:
    local: true
  tags:
    # N Version of the image
    - annotations:
        # language=json
        opendatahub.io/notebook-software: |
          [
            {"name": "Python", "version": "v3.12"}
          ]
        # language=json
        opendatahub.io/notebook-python-dependencies: |
          [
            {"name": "JupyterLab", "version": "4.5"}
          ]
        openshift.io/imported-from: quay.io/opendatahub/workbench-images
        opendatahub.io/workbench-image-recommended: 'true'
        opendatahub.io/default-image: "true"
        opendatahub.io/notebook-build-commit: odh-workbench-jupyter-minimal-cpu-py312-ubi9-commit-n_PLACEHOLDER
      from:
        kind: DockerImage
        name: odh-workbench-jupyter-minimal-cpu-py312-ubi9-n_PLACEHOLDER
      name: "3.5"
      referencePolicy:
        type: Source
    # N - 1 Version of the image
    - annotations:
        # language=json
        opendatahub.io/notebook-software: |
          [
            {"name": "Python", "version": "v3.12"}
          ]
        # language=json
        opendatahub.io/notebook-python-dependencies: |
          [
            {"name": "JupyterLab", "version": "4.2"}
          ]
        openshift.io/imported-from: quay.io/opendatahub/workbench-images
        opendatahub.io/workbench-image-recommended: 'false'
        opendatahub.io/notebook-build-commit: odh-workbench-jupyter-minimal-cpu-py312-ubi9-commit-3-4_PLACEHOLDER
      from:
        kind: DockerImage
        name: odh-workbench-jupyter-minimal-cpu-py312-ubi9-3-4_PLACEHOLDER
      name: "3.4"
      referencePolicy:
        type: Source
    # N - 2 Version of the image
    - annotations:
        # language=json
        opendatahub.io/notebook-software: |
          [
            {"name": "Python", "version": "v3.12"}
          ]
        # language=json
        opendatahub.io/notebook-python-dependencies: |
          [
            {"name": "JupyterLab", "version": "4.4"}
          ]
        openshift.io/imported-from: quay.io/modh/cuda-notebooks
        opendatahub.io/workbench-image-recommended: 'false'
        opendatahub.io/notebook-build-commit: odh-workbench-jupyter-minimal-cpu-py312-ubi9-commit-2025-2_PLACEHOLDER
      from:
        kind: DockerImage
        name: odh-workbench-jupyter-minimal-cpu-py312-ubi9-2025-2_PLACEHOLDER
      name: "2025.2"
      referencePolicy:
        type: Source
    # N - 3 Version of the image
    - annotations:
        # language=json
        opendatahub.io/notebook-software: |
          [
            {"name": "Python", "version": "v3.11"}
          ]
        # language=json
        opendatahub.io/notebook-python-dependencies: |
          [
            {"name": "JupyterLab", "version": "4.4"}
          ]
        openshift.io/imported-from: quay.io/modh/cuda-notebooks
        opendatahub.io/image-tag-outdated: "true"
        opendatahub.io/notebook-build-commit: odh-workbench-jupyter-minimal-cpu-py311-ubi9-commit-2025-1_PLACEHOLDER
      from:
        kind: DockerImage
        name: odh-workbench-jupyter-minimal-cpu-py311-ubi9-2025-1_PLACEHOLDER
      name: "2025.1"
      referencePolicy:
        type: Source
