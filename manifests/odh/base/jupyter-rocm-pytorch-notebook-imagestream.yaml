---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  labels:
    opendatahub.io/notebook-image: "true"
  annotations:
    opendatahub.io/notebook-image-url: "https://github.com/opendatahub-io/notebooks/blob/main/jupyter/rocm/pytorch"
    opendatahub.io/notebook-image-name: "Jupyter | PyTorch | ROCm | Python 3.12"
    opendatahub.io/notebook-image-desc: "Jupyter ROCm optimized PyTorch notebook image for ODH notebooks."
    opendatahub.io/notebook-image-order: "15"
    opendatahub.io/recommended-accelerators: '["amd.com/gpu"]'
  name: jupyter-rocm-pytorch
spec:
  lookupPolicy:
    local: true
  tags:
    # N Version of the image
    - annotations:
        # language=json
        opendatahub.io/notebook-software: |
          [
            {"name": "ROCm", "version": "v7.14"},
            {"name": "Python", "version": "v3.12"},
            {"name": "ROCm-PyTorch", "version": "2.11"}
          ]
        # language=json
        opendatahub.io/notebook-python-dependencies: |
          [
            {"name": "JupyterLab", "version": "4.5"},
            {"name": "ROCm-PyTorch", "version": "2.11"},
            {"name": "Tensorboard", "version": "2.20"},
            {"name": "Kafka-Python-ng", "version": "2.2"},
            {"name": "Matplotlib", "version": "3.11"},
            {"name": "Numpy", "version": "2.5"},
            {"name": "Pandas", "version": "2.3"},
            {"name": "Scikit-learn", "version": "1.9"},
            {"name": "Scipy", "version": "1.18"},
            {"name": "Odh-Elyra", "version": "5.0"},
            {"name": "PyMongo", "version": "4.17"},
            {"name": "Pyodbc", "version": "5.3"},
            {"name": "Codeflare-SDK", "version": "0.38"},
            {"name": "Feast", "version": "0.64"},
            {"name": "Sklearn-onnx", "version": "1.20"},
            {"name": "Psycopg", "version": "3.3"},
            {"name": "MySQL Connector/Python", "version": "9.7"},
            {"name": "Kubeflow-Training", "version": "1.9"},
            {"name": "MLflow", "version": "3.14"}
          ]
        openshift.io/imported-from: quay.io/opendatahub/odh-workbench-jupyter-pytorch-rocm-py312-ubi9
        opendatahub.io/workbench-image-recommended: 'true'
        opendatahub.io/notebook-build-commit: odh-workbench-jupyter-pytorch-rocm-py312-ubi9-commit-n_PLACEHOLDER
      from:
        kind: DockerImage
        name: odh-workbench-jupyter-pytorch-rocm-py312-ubi9-n_PLACEHOLDER
      name: "3.5"
      referencePolicy:
        type: Source
    # N - 1 Version of the image
    - annotations:
        # language=json
        opendatahub.io/notebook-software: |
          [
            {"name": "ROCm", "version": "v6.4"},
            {"name": "Python", "version": "v3.12"},
            {"name": "ROCm-PyTorch", "version": "2.9"}
          ]
