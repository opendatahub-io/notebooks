[project]
name = "notebooks"
version = "0.1.0"
requires-python = "==3.12.*"

dependencies = [
    # Subproject dependencies
    "notebooks-base-deps",
    "notebooks-datascience-deps",
    
    # Additional useful packages
    "opencensus~=0.11.4",
    "smart-open~=7.3.1",
    "virtualenv~=20.35.3",
    "py-spy~=0.4.1; platform_machine != 's390x'",
    "prometheus-client~=0.23.1",
]

[tool.uv.sources]
notebooks-base-deps = { path = "../../dependencies/base" }
notebooks-datascience-deps = { path = "../../dependencies/datascience" }

[tool.uv]
environments = [
    "sys_platform == 'linux' and implementation_name == 'cpython'",
]
