    # Arrow C++ bundled deps for hermetic s390x/ppc64le build (--network=none).
    # These are NOT part of boost-devel — they are separate third-party libraries.
    # Versions from arrow/cpp/thirdparty/versions.txt. Arrow's CMake reads ARROW_*_URL
    # env vars (set in devel_env_setup.sh) so it uses these local tarballs instead of downloading.
    - url: https://dlcdn.apache.org/thrift/0.22.0/thrift-0.22.0.tar.gz
      filename: thrift-0.22.0.tar.gz
    - url: https://github.com/jemalloc/jemalloc/releases/download/5.3.0/jemalloc-5.3.0.tar.bz2
      filename: jemalloc-5.3.0.tar.bz2
    - url: https://github.com/microsoft/mimalloc/archive/v2.2.4.tar.gz
      filename: mimalloc-v2.2.4.tar.gz
    - url: https://github.com/miloyip/rapidjson/archive/232389d4f1012dddec4ef84861face2d2ba85709.tar.gz
      filename: rapidjson-232389d4f1012dddec4ef84861face2d2ba85709.tar.gz
    - url: https://github.com/google/re2/archive/2022-06-01.tar.gz
      filename: re2-2022-06-01.tar.gz
    - url: https://github.com/JuliaStrings/utf8proc/archive/v2.10.0.tar.gz
      filename: utf8proc-v2.10.0.tar.gz
    - url: https://github.com/xtensor-stack/xsimd/archive/13.0.0.tar.gz
      filename: xsimd-13.0.0.tar.gz
    # Compression codecs (prefetched as safety net; only used if Arrow enables them)
    - url: https://github.com/google/snappy/archive/1.2.2.tar.gz
      filename: snappy-1.2.2.tar.gz
    - url: https://github.com/google/brotli/archive/v1.0.9.tar.gz
      filename: brotli-v1.0.9.tar.gz
    - url: https://github.com/lz4/lz4/archive/v1.10.0.tar.gz
      filename: lz4-v1.10.0.tar.gz
    - url: https://github.com/facebook/zstd/releases/download/v1.5.7/zstd-1.5.7.tar.gz
      filename: zstd-1.5.7.tar.gz
    - url: https://zlib.net/fossils/zlib-1.3.1.tar.gz
      filename: zlib-1.3.1.tar.gz

    # ONNX bundled deps for hermetic ppc64le/s390x build (--network=none).
    # onnx's CMake downloads protobuf via FetchContent, and protobuf downloads abseil-cpp.
    # We prefetch both tarballs and use FETCHCONTENT_SOURCE_DIR_* env vars in devel_env_setup.sh
    # to redirect CMake to local sources. Versions from protobuf v31.1's cmake/dependencies.cmake.
    - url: https://github.com/protocolbuffers/protobuf/releases/download/v31.1/protobuf-31.1.tar.gz
      filename: protobuf-31.1.tar.gz
    - url: https://github.com/abseil/abseil-cpp/archive/refs/tags/20250127.0.tar.gz
      filename: abseil-cpp-20250127.0.tar.gz

    # OpenBlas required for ppc64le
    - url: https://github.com/OpenMathLib/OpenBLAS/releases/download/v0.3.30/OpenBLAS-0.3.30.tar.gz      
