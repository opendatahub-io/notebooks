---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: notebook
  annotations:
    opendatahub.io/username: jovyan
  labels:
    opendatahub.io/user: jovyan
spec:
  replicas: 1
  selector: {}
  serviceName: notebook
  template:
    metadata:
      labels: {}
    spec:
      containers:
        - name: notebook
          image: quay.io/opendatahub/workbench-images:jupyter-datascience-ubi9-python-3.12
          imagePullPolicy: Always
          workingDir: /opt/app-root/src
          env:
            - name: NOTEBOOK_ARGS
              value: |-
                --ServerApp.port=8888
                --ServerApp.token=''
                --ServerApp.password=''
                --ServerApp.base_url=/notebook/opendatahub/jovyan
                --ServerApp.quit_button=False
          ports:
            - name: notebook-port
              protocol: TCP
              containerPort: 8888
          # Generous delays for slow or constrained nodes (e.g. ppc64le in CI).
          # Liveness must allow Jupyter + datascience deps to bind before first check (avoids restart loops).
          livenessProbe:
            tcpSocket:
              port: notebook-port
            initialDelaySeconds: 120
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /notebook/opendatahub/jovyan/api
              port: notebook-port
              scheme: HTTP
            initialDelaySeconds: 90
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 6
          # Jupyter + papermill share the pod cgroup; keep headroom for single-cell datascience tests on ppc64le.
          resources:
            limits:
              cpu: 500m
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 4Gi
