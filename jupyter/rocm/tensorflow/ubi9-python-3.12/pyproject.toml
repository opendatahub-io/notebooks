[project]
name = "rocm-tensorflow-notebook"
version = "0.1.0"
requires-python = "==3.12.*"

dependencies = [

    # ROCm TensorFlow packages
    # https://rocm.docs.amd.com/projects/install-on-linux/en/latest/install/3rd-party/tensorflow-install.html#using-a-wheels-package
    # TODO(jdanek): consider adding #sha256=814a5e4842b0c92d63c7a0bb4df0baf51ff2db8615535d83fe8958204b840598
    "tensorflow-rocm @ https://repo.radeon.com/rocm/manylinux/rocm-rel-6.4/tensorflow_rocm-2.18.1-cp312-cp312-manylinux_2_28_x86_64.whl",
    # tensorflow-rocm==2.x needs tensorboard>=2.x,<2.x+1
    "tensorboard",

    # Datascience and useful extensions
    "codeflare-sdk",
    "feast",
    "skl2onnx",
    "odh-notebooks-meta-workbench-datascience-deps",

    "odh-notebooks-meta-db-connectors-deps",
    "odh-notebooks-meta-jupyterlab-deps",
    "odh-notebooks-meta-jupyterlab-datascience-deps",

    # Base packages
    "wheel",
    "setuptools",
]

[tool.uv.sources]
odh-notebooks-meta-workbench-datascience-deps = { path = "../../../../dependencies/odh-notebooks-meta-workbench-datascience-deps" }
odh-notebooks-meta-db-connectors-deps = { path = "../../../../dependencies/odh-notebooks-meta-db-connectors-deps" }
odh-notebooks-meta-jupyterlab-deps = { path = "../../../../dependencies/odh-notebooks-meta-jupyterlab-deps" }
odh-notebooks-meta-jupyterlab-datascience-deps = { path = "../../../../dependencies/odh-notebooks-meta-jupyterlab-datascience-deps" }

[tool.uv]

override-dependencies = [
    # Conflict between kfp and codeflare-sdk over kubernetes version
    "kubernetes>=35.0.0",
    # tensorflow-rocm depends on protobuf>=3.20.3, <6.0.0 and kfp depends on protobuf>=6.31.1.
    # AIPCC-13675: protobuf 6.33.5+ UPB C extension segfaults on s390x; pin to last good release.
    "protobuf==6.31.1",
    # RHAIENG-2458: CVE-2025-66418 urllib3 - override needed because odh-elyra pulls in
    # appengine-python-standard which has an obnoxious urllib3<2 constraint
    "urllib3>=2.6.0",
]

constraint-dependencies = [
    # AttributeError: module 'ml_dtypes' has no attribute 'float4_e2m1fn'
    "onnx<1.19.0",
]

environments = [
    "sys_platform == 'linux' and implementation_name == 'cpython'",
]
