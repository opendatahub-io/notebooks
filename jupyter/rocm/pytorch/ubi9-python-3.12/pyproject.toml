[project]
name = "rocm-pytorch-notebook"
version = "0.1.0"
requires-python = "==3.12.*"

dependencies = [
    # ROCm PyTorch packages
    "tensorboard~=2.20.0",
    "torch==2.7.1+rocm6.3",
    "torchvision==0.22.1+rocm6.3", # https://pytorch.org/get-started/previous-versions/#linux-and-windows-1
    "pytorch-triton-rocm~=3.3.1",

    # Subproject dependencies
    "notebooks-base-deps",
    "notebooks-jupyterlab-deps",
    "notebooks-jupyterlab-datascience-deps",
    "notebooks-datascience-deps",
    "notebooks-db-connectors-deps",
]

[tool.uv.sources]
torch = { index = "pytorch-rocm" }
torchvision = { index = "pytorch-rocm" }
pytorch-triton-rocm = { index = "pytorch-rocm" }
notebooks-base-deps = { path = "../../../../dependencies/base" }
notebooks-jupyterlab-deps = { path = "../../../../dependencies/jupyterlab" }
notebooks-jupyterlab-datascience-deps = { path = "../../../../dependencies/jupyterlab-datascience" }
notebooks-datascience-deps = { path = "../../../../dependencies/datascience" }
notebooks-db-connectors-deps = { path = "../../../../dependencies/db-connectors" }

# Please keep in sync with rocm/ubi9-python-3.12/Dockerfile
[[tool.uv.index]]
name = "pytorch-rocm"
url = "https://download.pytorch.org/whl/rocm6.3"
explicit = true

[tool.uv]
environments = [
    "sys_platform == 'linux' and implementation_name == 'cpython'",
]
